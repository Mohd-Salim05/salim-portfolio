  prose: (content) => content.map(p => `<div class="prose"><p>${p}</p></div>`).join(""),

  skillGroups: (content) => `<div class="skill-groups">${content.map(g => `
    <div class="skill-group">
      <div class="g-title">${g.group}</div>
      <div class="chip-list">${g.items.map(i => `<span class="chip">${i}</span>`).join("")}</div>
    </div>`).join("")}</div>`,

  timeline: (content) => content.map(entry => `
    <div class="tl-entry">
      <div class="tl-head">
        <span class="org">${entry.org}</span>
        <span class="period">${entry.period}</span>
      </div>
      <div class="tl-role">${entry.role}</div>
      <div class="tl-steps">
        ${entry.blocks.map(b => `
          <div class="tl-block">
            <div class="tl-card">
              <div class="b-title">${b.title}</div>
              <ul>${b.bullets.map(x => `<li>${x}</li>`).join("")}</ul>
              ${b.stats ? `<div class="tl-stats">${b.stats.map(s => `<span>${s}</span>`).join("")}</div>` : ""}
            </div>
          </div>`).join("")}
      </div>
    </div>`).join(""),

  cards: (content) => `<div class="card-grid">${content.map(c => `
    <div class="card">
      <h3>${c.title}</h3>
      <ul>${c.bullets.map(b => `<li>${b}</li>`).join("")}</ul>
      ${c.tags ? `<div class="tag-list">${c.tags.map(t => `<span>${t}</span>`).join("")}</div>` : ""}
    </div>`).join("")}</div>`,

  list: (content) => `<ul class="simple-list">${content.map(i => `
    <li><span class="li-title">${i.title}</span>${i.sub ? `<span class="li-sub">${i.sub}</span>` : ""}</li>`).join("")}</ul>`
};


function build(){
  document.title = `${portfolio.name} — ${portfolio.role}`;
  document.getElementById("year").textContent = new Date().getFullYear();

  document.getElementById("heroName").textContent = portfolio.name;
  document.getElementById("heroRole").textContent = portfolio.role;
  document.getElementById("heroSummary").textContent = portfolio.tagline || "";

  const avatarSlot = document.getElementById("avatarSlot");
  if(portfolio.photo.type === "image"){
    avatarSlot.innerHTML = `<img src="${portfolio.photo.src}" alt="${portfolio.name}">`;
  } else {
    avatarSlot.textContent = portfolio.photo.value;
  }

  document.getElementById("contactStrip").innerHTML = portfolio.contact.map(c =>
    c.href ? `<a href="${c.href}">${c.value}</a>` : `<span>${c.value}</span>`
  ).join("");

  document.getElementById("statStrip").innerHTML = portfolio.stats.map(s =>
    `<div class="kpi"><div class="num">${s.num}</div><div class="lbl">${s.label}</div></div>`
  ).join("");

  const navLinks = document.getElementById("navLinks");
  navLinks.innerHTML = portfolio.sections.map(s => `<a href="#${s.id}" data-id="${s.id}">${s.title}</a>`).join("");

  const main = document.getElementById("panels");
  main.innerHTML = portfolio.sections.map(s => `
    <section class="panel" id="${s.id}">
      <div class="panel-head">
        <span class="bar"></span>
        <h2>${s.title}</h2>
      </div>
      ${renderers[s.type] ? renderers[s.type](s.content) : ""}
    </section>
  `).join("");
}
build();


const navToggle = document.getElementById("navToggle");
const navLinks = document.getElementById("navLinks");
navToggle.addEventListener("click", () => navLinks.classList.toggle("open"));
navLinks.querySelectorAll("a").forEach(a => a.addEventListener("click", () => navLinks.classList.remove("open")));

const panels = document.querySelectorAll(".panel");
const navAnchors = document.querySelectorAll(".navlinks a");

const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add("is-visible"); });
}, { threshold: 0.12 });
panels.forEach(s => revealObserver.observe(s));

const activeObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if(e.isIntersecting){
      navAnchors.forEach(a => a.classList.toggle("active", a.dataset.id === e.target.id));
    }
  });
}, { threshold: 0.5 });
panels.forEach(s => activeObserver.observe(s));
</script>
</body>
</html>
